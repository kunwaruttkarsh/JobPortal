version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: job_portal_db
    environment:
      MYSQL_DATABASE: job_portal
      MYSQL_USER: jobuser
      MYSQL_PASSWORD: jobpassword123
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - job_portal_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: job_portal_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/job_portal
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_REGION: ap-south-1
      AWS_BUCKET_NAME: job-portal-resumes-utkarsh

    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - job_portal_network

volumes:
  mysql_data:

networks:
  job_portal_network:
